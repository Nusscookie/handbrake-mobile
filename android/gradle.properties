org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Kotlin's incremental compiler stores source-file paths relative to the project
# root. When the pub cache lives on a different Windows drive (C:) than the
# project (E:), computing that relative path throws IllegalArgumentException
# ("different roots") and the build fails. Disabling incremental compilation
# avoids the cross-drive path issue entirely. Builds take a few seconds longer
# but are fully correct.
kotlin.incremental=false
